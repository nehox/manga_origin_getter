<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Catalogue - Manga Origin Getter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #14171d;
      --line: #30374a;
      --text: #e7edf7;
      --muted: #9aa8bf;
      --accent: #f5b126;
      --ok: #3ac97b;
      --warn: #f4a23a;
      --bad: #ea5a58;
      --info: #53a3ff;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; font-family: "Manrope", sans-serif; background: var(--bg); color: var(--text); }
    .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }
    .sidebar {
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, #191d25, #161a21);
      padding: 14px 12px;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 14px;
    }
    .logo { display: flex; align-items: center; gap: 8px; font-weight: 800; color: #f7f9fe; }
    .logo-mark { width: 26px; height: 26px; border-radius: 6px; background: linear-gradient(140deg, var(--accent), #d97f00); display: inline-flex; align-items: center; justify-content: center; color: #241800; font-weight: 900; font-size: 0.78rem; }
    .menu { display: grid; gap: 5px; }
    .menu a { color: #d5deeb; text-decoration: none; padding: 9px 10px; border-radius: 8px; font-size: 0.9rem; border: 1px solid transparent; }
    .menu a.active { background: #252c3a; border-color: #374058; color: #fff; }
    .menu a:hover { border-color: #333b4d; background: #222836; }

    .main { display: grid; grid-template-rows: auto auto 1fr; min-width: 0; }
    .topbar { padding: 12px 14px; border-bottom: 1px solid var(--line); background: #181d27; display: grid; gap: 10px; }
    .search-row { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; }
    .search-wrap { display: flex; align-items: center; gap: 8px; border: 1px solid #3a4357; background: #10141c; border-radius: 8px; padding: 0 10px; min-height: 38px; flex: 1 1 200px; }
    .search-wrap input { border: none; outline: none; width: 100%; background: transparent; color: #edf2fb; font: inherit; }
    .search-wrap input::placeholder { color: #7e8ca5; }
    select, button { font: inherit; border-radius: 7px; }
    select { border: 1px solid #3a4357; background: #10141c; color: #edf2fb; padding: 8px 9px; }
    button { border: 1px solid #434f68; background: #2a3243; color: #edf2fb; padding: 8px 10px; cursor: pointer; font-weight: 600; }
    button:hover { background: #323c52; }
    .accent { background: linear-gradient(120deg, #f5b126, #e58d10); border-color: #e79918; color: #241700; }

    .stats { border-bottom: 1px solid var(--line); padding: 10px 14px; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; background: #171c26; }
    .stat { border: 1px solid #364057; background: #1f2532; border-radius: 8px; padding: 8px 9px; }
    .stat .label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em; color: #96a7bf; }
    .stat .value { margin-top: 5px; font-size: 0.92rem; font-weight: 700; }

    .grid { padding: 12px; overflow: auto; display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); align-content: start; }
    .card { border: 1px solid #364058; border-radius: 10px; background: #1f2532; overflow: hidden; cursor: pointer; display: grid; grid-template-rows: 150px auto; text-decoration: none; color: inherit; }
    .card:hover { border-color: #4d5e81; }
    .poster { position: relative; background: linear-gradient(150deg, #23304a, #2c2241 45%, #4f2a24); display: flex; align-items: flex-end; padding: 10px; }
    .poster::before { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(10, 12, 17, 0.08), rgba(10, 12, 17, 0.7)); }
    .poster-text { position: relative; z-index: 1; font-weight: 700; font-size: 0.87rem; line-height: 1.25; max-height: 2.5em; overflow: hidden; }
    .status-pill { position: absolute; top: 8px; right: 8px; z-index: 1; font-size: 0.66rem; padding: 3px 6px; border-radius: 20px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.04em; border: 1px solid; background: rgba(20, 24, 33, 0.82); }
    .status-pill.ok { color: var(--ok); border-color: #38895f; }
    .status-pill.error { color: var(--bad); border-color: #a05050; }
    .card-body { padding: 9px; display: grid; gap: 7px; }
    .small { color: #9db0cb; font-size: 0.76rem; line-height: 1.3; }
    .chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .chip { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.05em; border: 1px solid; border-radius: 20px; padding: 2px 6px; font-weight: 800; background: #141923; }
    .chip.good { color: var(--ok); border-color: #3e8e63; }
    .chip.warn { color: var(--warn); border-color: #9b7a3d; }
    .chip.info { color: var(--info); border-color: #4a7fb0; }

    .placeholder { color: #9fb1cb; }
    .msg { color: #9fb0ca; font-size: 0.8rem; }

    @media (max-width: 1080px) {
      .app { grid-template-columns: 1fr; }
      .menu { grid-template-columns: repeat(5, minmax(0, 1fr)); }
      .stats { grid-template-columns: 1fr; }
    }
    @media (max-width: 760px) {
      .menu { grid-template-columns: 1fr; }
      .search-row { flex-direction: column; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo"><span class="logo-mark">MO</span><span>Manga Origin</span></div>
      <nav class="menu">
        <a class="active" href="/">Catalogue</a>
        <a href="/add-manga.html">Ajouter un manga</a>
        <a href="/link-manga.html">Lier un manga</a>
        <a href="/downloads.html">Telechargements</a>
        <a href="/logs.html">Logs</a>
        <a href="/settings.html">Parametres</a>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="search-row">
          <div class="search-wrap"><span>🔎</span><input id="searchInput" placeholder="Rechercher un manga..." /></div>
          <select id="filterSelect">
            <option value="all">Tous</option>
            <option value="missing">Avec chapitres manquants</option>
            <option value="ok">Complets</option>
            <option value="error">Scan en erreur</option>
          </select>
          <select id="categorySelect">
            <option value="all">Toutes categories</option>
          </select>
          <label style="display:flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--muted);white-space:nowrap;">
            <input id="hideAdultCheck" type="checkbox" /> Masquer 18+
          </label>
          <button id="scanAllBtn" class="accent" type="button">Scanner toute la collection</button>
        </div>
        <div id="tableMsg" class="msg"></div>
      </header>

      <section class="stats">
        <div class="stat"><span class="label">Mangas suivis</span><div id="trackedCount" class="value">0</div></div>
        <div class="stat"><span class="label">Dossiers non lies</span><div id="unlinkedCount" class="value">0</div></div>
      </section>

      <section id="mangaGrid" class="grid"></section>
    </main>
  </div>

  <script>
    const searchInput = document.getElementById("searchInput");
    const filterSelect = document.getElementById("filterSelect");
    const categorySelect = document.getElementById("categorySelect");
    const hideAdultCheck = document.getElementById("hideAdultCheck");
    const scanAllBtn = document.getElementById("scanAllBtn");
    const tableMsg = document.getElementById("tableMsg");

    const trackedCount = document.getElementById("trackedCount");
    const unlinkedCount = document.getElementById("unlinkedCount");
    const mangaGrid = document.getElementById("mangaGrid");

    let overview = null;
    let hideAdult = false;

    searchInput.addEventListener("input", renderOverview);
    filterSelect.addEventListener("change", renderOverview);
    categorySelect.addEventListener("change", renderOverview);
    hideAdultCheck.addEventListener("change", () => {
      hideAdult = hideAdultCheck.checked;
      fetch("/settings/adult-filter", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ hide_adult_content: hideAdult })
      }).catch(() => {});
      renderOverview();
    });

    scanAllBtn.addEventListener("click", async () => {
      scanAllBtn.disabled = true;
      tableMsg.textContent = "Scan global en cours...";
      try {
        const response = await fetch("/library/scan-all", { method: "POST" });
        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          throw new Error(payload.detail || `HTTP ${response.status}`);
        }
        const payload = await response.json();
        tableMsg.textContent = `Scan global termine. Scannes: ${payload.scanned}, erreurs: ${payload.errors.length}.`;
        await refreshOverview();
      } catch (error) {
        tableMsg.textContent = `Erreur scan global: ${error}`;
      } finally {
        scanAllBtn.disabled = false;
      }
    });

    function filterMangas(items) {
      const q = searchInput.value.trim().toLowerCase();
      const mode = filterSelect.value;
      const selectedCategory = categorySelect.value;
      return items.filter((manga) => {
        if (hideAdult && manga.is_adult) return false;
        if (selectedCategory !== "all") {
          const cats = manga.categories || [];
          if (!cats.includes(selectedCategory)) return false;
        }

        const matchesSearch = !q
          || String(manga.title || "").toLowerCase().includes(q)
          || String(manga.source_url || "").toLowerCase().includes(q)
          || String(manga.local_subdir || "").toLowerCase().includes(q);

        if (!matchesSearch) return false;
        if (mode === "missing") return (manga.missing_total || 0) > 0;
        if (mode === "ok") return (manga.missing_total || 0) === 0;
        if (mode === "error") return manga.last_scan_status === "error";
        return true;
      });
    }

    function buildCategoryOptions(mangas) {
      const all = new Set();
      for (const m of mangas) {
        if (m.categories) {
          for (const c of m.categories) all.add(c);
        }
      }
      const sorted = Array.from(all).sort();
      categorySelect.innerHTML = '<option value="all">Toutes categories</option>';
      for (const c of sorted) {
        const opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        categorySelect.appendChild(opt);
      }
    }

    function renderOverview() {
      if (!overview) return;
      trackedCount.textContent = String(overview.mangas.length);
      unlinkedCount.textContent = String(overview.unlinked_dirs.length);

      buildCategoryOptions(overview.mangas);

      const visible = filterMangas(overview.mangas);
      mangaGrid.innerHTML = "";

      if (!overview.mangas.length) {
        mangaGrid.innerHTML = '<div class="placeholder">Aucun manga suivi. Va sur Ajouter un manga.</div>';
        return;
      }
      if (!visible.length) {
        mangaGrid.innerHTML = '<div class="placeholder">Aucun manga ne correspond au filtre.</div>';
        return;
      }

      for (const manga of visible) {
        const card = document.createElement("a");
        card.className = "card";
        card.href = `/manga-detail.html?id=${encodeURIComponent(manga.id)}`;

        const statusClass = manga.last_scan_status === "error" ? "error" : "ok";
        const statusText = manga.last_scan_status === "error" ? "Error" : "OK";
        const missingChip = (manga.missing_total || 0) > 0
          ? `<span class="chip warn">${manga.missing_total} manquants</span>`
          : '<span class="chip good">Complet</span>';
        const autoChip = manga.auto_download_missing
          ? '<span class="chip info">Auto ON</span>'
          : '<span class="chip warn">Auto OFF</span>';
        const coverUrl = manga.cover_url || "";
        const coverStyle = coverUrl ? `background-image:url(${escapeHtml(coverUrl)});background-size:cover;background-position:center;` : "";
        const categoriesChips = (manga.categories || []).map(c =>
          `<span class="chip info">${escapeHtml(c)}</span>`
        ).join("");

        card.innerHTML = `
          <div class="poster" style="${coverStyle}">
            ${coverUrl ? `<img src="${escapeHtml(coverUrl)}" alt="" style="display:none" />` : ""}
            <span class="status-pill ${statusClass}">${statusText}</span>
            <div class="poster-text">${escapeHtml(manga.title)}</div>
          </div>
          <div class="card-body">
            <div class="small">${manga.present_total}/${manga.remote_total} chapitres presents</div>
            <div class="chips">${missingChip}${autoChip}</div>
            ${categoriesChips ? `<div class="chips">${categoriesChips}</div>` : ""}
            <div class="small">Prochain scan: ${escapeHtml(manga.next_scan_at || "-")}</div>
          </div>
        `;
        mangaGrid.appendChild(card);
      }
    }

    async function refreshOverview() {
      const [overviewRes, filterRes] = await Promise.all([
        fetch("/library/overview"),
        fetch("/settings/adult-filter"),
      ]);
      if (!overviewRes.ok) {
        const payload = await overviewRes.json().catch(() => ({}));
        throw new Error(payload.detail || `HTTP ${overviewRes.status}`);
      }
      overview = await overviewRes.json();
      if (filterRes.ok) {
        const filterData = await filterRes.json();
        hideAdult = filterData.hide_adult_content;
        hideAdultCheck.checked = hideAdult;
      }
      renderOverview();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    refreshOverview().catch((error) => {
      tableMsg.textContent = `Erreur initiale: ${error}`;
    });

    setInterval(() => {
      refreshOverview().catch(() => null);
    }, 30000);
  </script>
</body>
</html>
