<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ajouter Manga - Manga Origin Getter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --bg:#14171d; --line:#30374a; --text:#e7edf7; --muted:#9aa8bf; --accent:#f5b126; }
    * { box-sizing: border-box; }
    html, body { margin:0; min-height:100%; font-family:"Manrope",sans-serif; background:var(--bg); color:var(--text); }
    .app { display:grid; grid-template-columns:240px 1fr; min-height:100vh; }
    .sidebar { border-right:1px solid var(--line); background:linear-gradient(180deg,#191d25,#161a21); padding:14px 12px; display:grid; grid-template-rows:auto auto 1fr; gap:14px; }
    .logo { display:flex; align-items:center; gap:8px; font-weight:800; color:#f7f9fe; }
    .logo-mark { width:26px; height:26px; border-radius:6px; background:linear-gradient(140deg,var(--accent),#d97f00); display:inline-flex; align-items:center; justify-content:center; color:#241800; font-weight:900; font-size:.78rem; }
    .menu { display:grid; gap:5px; }
    .menu a { color:#d5deeb; text-decoration:none; padding:9px 10px; border-radius:8px; font-size:.9rem; border:1px solid transparent; }
    .menu a.active { background:#252c3a; border-color:#374058; color:#fff; }
    .menu a:hover { border-color:#333b4d; background:#222836; }
    .wrap { max-width: 900px; padding: 14px; display:grid; gap:12px; align-content:start; min-width:0; }
    button { border:1px solid #434f68; background:#2a3243; color:#edf2fb; padding:8px 10px; border-radius:7px; font:inherit; cursor:pointer; }
    .accent { background:linear-gradient(120deg,#f5b126,#e58d10); border-color:#e79918; color:#241700; }
    .box { border:1px solid var(--line); border-radius:10px; background:#1d2330; padding:12px; display:grid; gap:10px; }
    h1 { margin:0; font-size:1.4rem; }
    p { margin:0; color:#b4c2d8; }
    .row { display:grid; grid-template-columns: 1fr 140px 220px; gap:8px; }
    input, select { border:1px solid #3a4357; background:#10141c; color:#edf2fb; padding:8px 9px; border-radius:7px; }
    label { display:flex; align-items:center; gap:8px; color:#b4c2d8; font-size:.9rem; }
    .msg { color:#9fb0ca; min-height:1.1em; }
    @media (max-width: 1080px) {
      .app { grid-template-columns: 1fr; }
      .menu { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    }
    @media (max-width: 760px) {
      .row { grid-template-columns:1fr; }
      .menu { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo"><span class="logo-mark">MO</span><span>Manga Origin</span></div>
      <nav class="menu">
        <a href="/">Catalogue</a>
        <a class="active" href="/add-manga.html">Ajouter un manga</a>
        <a href="/link-manga.html">Lier un manga</a>
        <a href="/downloads.html">Telechargements</a>
        <a href="/settings.html">Parametres</a>
      </nav>
    </aside>

    <main class="wrap">
    <section class="box">
      <h1>Ajouter un manga</h1>
      <p>Ajoute une URL d'oeuvre et configure son scan.</p>
      <div class="row">
        <input id="sourceUrl" placeholder="https://.../oeuvre/... ou /manga/..." />
        <input id="interval" type="number" min="5" value="60" />
        <input id="localSubdir" placeholder="sous-dossier (optionnel)" />
      </div>
      <div class="row">
        <select id="rootId"></select>
      </div>
      <label><input id="autoDownloadMissing" type="checkbox" /> Auto-telecharger les chapitres manquants</label>
      <div>
        <button id="addBtn" class="accent">Ajouter et scanner</button>
      </div>
      <div id="msg" class="msg"></div>
    </section>
    </main>
  </div>

  <script>
    const sourceUrlInput = document.getElementById("sourceUrl");
    const intervalInput = document.getElementById("interval");
    const localSubdirInput = document.getElementById("localSubdir");
    const rootIdSelect = document.getElementById("rootId");
    const autoDownloadMissingInput = document.getElementById("autoDownloadMissing");
    const addBtn = document.getElementById("addBtn");
    const msg = document.getElementById("msg");

    async function loadRoots() {
      const response = await fetch("/library/roots");
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const roots = await response.json();
      rootIdSelect.innerHTML = "";

      if (!roots.length) {
        const option = document.createElement("option");
        option.value = "";
        option.textContent = "Aucune racine configuree - va dans Parametres";
        rootIdSelect.appendChild(option);
        addBtn.disabled = true;
        return;
      }

      addBtn.disabled = false;
      for (const root of roots) {
        const option = document.createElement("option");
        option.value = String(root.id);
        option.textContent = root.path;
        rootIdSelect.appendChild(option);
      }
    }

    addBtn.addEventListener("click", async () => {
      const sourceUrl = sourceUrlInput.value.trim();
      const interval = Number(intervalInput.value || "60");
      const localSubdir = localSubdirInput.value.trim();
      const rootId = rootIdSelect.value ? Number(rootIdSelect.value) : null;
      const autoDownloadMissing = autoDownloadMissingInput.checked;

      if (!sourceUrl) {
        msg.textContent = "URL oeuvre requise.";
        return;
      }

      addBtn.disabled = true;
      try {
        const response = await fetch("/library/mangas", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            source_url: sourceUrl,
            scan_interval_minutes: interval,
            local_subdir: localSubdir || null,
            auto_download_missing: autoDownloadMissing,
            root_id: rootId,
          })
        });

        if (!response.ok) {
          const payload = await response.json().catch(() => ({}));
          throw new Error(payload.detail || `HTTP ${response.status}`);
        }

        const payload = await response.json();
        msg.textContent = "Manga ajoute. Redirection...";
        window.location.href = `/manga-detail.html?id=${encodeURIComponent(payload.id)}`;
      } catch (error) {
        msg.textContent = `Erreur ajout: ${error}`;
      } finally {
        addBtn.disabled = false;
      }
    });

    loadRoots().catch((error) => {
      msg.textContent = `Erreur chargement racines: ${error}`;
    });
  </script>
</body>
</html>
